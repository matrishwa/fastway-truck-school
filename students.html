<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management - Fastway School</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f1ed;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            background: #5d3b3b;
            color: #f5f1ed;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .section-title {
            color: #5d3b3b;
            font-size: 22px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #dda15e;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #5d3b3b;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #dda15e;
            border-radius: 5px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            color: #333;
        }
        
        input:focus,
        textarea:focus {
            outline: none;
            border-color: #5d3b3b;
            box-shadow: 0 0 5px rgba(93, 59, 59, 0.3);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #5d3b3b;
            color: #f5f1ed;
        }
        
        .btn-primary:hover {
            background: #8b5a5a;
        }
        
        .btn-success {
            background: #2d7d3a;
            color: white;
        }
        
        .btn-success:hover {
            background: #1f5a2a;
        }
        
        .btn-danger {
            background: #c41e3a;
            color: white;
            padding: 8px 15px;
            font-size: 12px;
        }
        
        .btn-danger:hover {
            background: #a01829;
        }
        
        .btn-copy {
            background: #2196F3;
            color: white;
            padding: 8px 15px;
            font-size: 12px;
        }
        
        .btn-copy:hover {
            background: #0b7dda;
        }
        
        .student-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .student-table th {
            background: #5d3b3b;
            color: #f5f1ed;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }
        
        .student-table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        
        .student-table tr:hover {
            background: #ede8e3;
        }
        
        .password-display {
            background: #f9f5f2;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #5d3b3b;
            font-weight: 600;
        }
        
        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        .error-msg {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👨‍🎓 Student Password Management</h1>
            <p>Fastway Truck & Forklift Driving School</p>
        </div>
        
        <div class="success-msg" id="successMsg"></div>
        <div class="error-msg" id="errorMsg"></div>
        
        <div class="section-title">Add New Student</div>
        
        <div class="form-group">
            <label for="studentName">Student Name</label>
            <input type="text" id="studentName" placeholder="Enter student name">
        </div>
        
        <div class="form-group">
            <label for="studentEmail">Email Address</label>
            <input type="email" id="studentEmail" placeholder="Enter email address">
        </div>
        
        <div class="form-group">
            <label for="studentPassword">Password</label>
            <input type="text" id="studentPassword" placeholder="Enter password">
        </div>
        
        <div class="button-group">
            <button class="btn-success" onclick="addStudent()">➕ Add Student</button>
        </div>
        
        <div style="margin-top: 40px;">
            <div class="section-title">Student List</div>
            <table class="student-table" id="studentTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Password</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="studentsList">
                    <tr>
                        <td colspan="4" style="text-align: center; color: #999;">No students added yet</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        // Load students from localStorage
        function loadStudents() {
            const students = JSON.parse(localStorage.getItem('students')) || [];
            const tbody = document.getElementById('studentsList');
            
            if (students.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #999;">No students added yet</td></tr>';
                return;
            }
            
            tbody.innerHTML = students.map((student, index) => `
                <tr>
                    <td>${student.name}</td>
                    <td>${student.email}</td>
                    <td><span class="password-display">${student.password}</span></td>
                    <td>
                        <button class="btn-copy" onclick="copyPassword('${student.password}')">📋 Copy</button>
                        <button class="btn-danger" onclick="deleteStudent(${index})">🗑️ Delete</button>
                    </td>
                </tr>
            `).join('');
        }
        
        // Add new student
        function addStudent() {
            const name = document.getElementById('studentName').value.trim();
            const email = document.getElementById('studentEmail').value.trim();
            const password = document.getElementById('studentPassword').value.trim();
            
            if (!name || !email || !password) {
                showError('All fields are required!');
                return;
            }
            
            const students = JSON.parse(localStorage.getItem('students')) || [];
            students.push({ name, email, password });
            localStorage.setItem('students', JSON.stringify(students));
            
            document.getElementById('studentName').value = '';
            document.getElementById('studentEmail').value = '';
            document.getElementById('studentPassword').value = '';
            
            showSuccess(`Student "${name}" added successfully!`);
            loadStudents();
        }
        
        // Delete student
        function deleteStudent(index) {
            const students = JSON.parse(localStorage.getItem('students')) || [];
            const studentName = students[index].name;
            students.splice(index, 1);
            localStorage.setItem('students', JSON.stringify(students));
            
            showSuccess(`Student "${studentName}" deleted successfully!`);
            loadStudents();
        }
        
        // Copy password to clipboard
        function copyPassword(password) {
            navigator.clipboard.writeText(password).then(() => {
                showSuccess('Password copied to clipboard!');
            });
        }
        
        // Show success message
        function showSuccess(message) {
            const msg = document.getElementById('successMsg');
            msg.textContent = '✅ ' + message;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }
        
        // Show error message
        function showError(message) {
            const msg = document.getElementById('errorMsg');
            msg.textContent = '❌ ' + message;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }
        
        // Load students on page load
        window.onload = loadStudents;
    </script>
</body>
</html>
