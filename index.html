<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fastway Truck & Forklift Driving School - Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #5d3b3b 0%, #8b5a5a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: #f5f1ed;
            padding: 50px 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .logo-section {
            margin-bottom: 30px;
        }

        .logo-section h1 {
            color: #5d3b3b;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .logo-section p {
            color: #8b5a5a;
            font-size: 14px;
            line-height: 1.6;
        }

        .contact-info {
            background: #ede8e3;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            font-size: 12px;
            color: #5d3b3b;
        }

        .form-group {
            margin: 25px 0;
        }

        label {
            display: block;
            color: #5d3b3b;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: left;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #8b5a5a;
            border-radius: 5px;
            font-size: 16px;
            background: #fff;
            color: #333;
            transition: border-color 0.3s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #5d3b3b;
            box-shadow: 0 0 5px rgba(93,59,59,0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #5d3b3b;
            color: #f5f1ed;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #8b5a5a;
        }

        .error {
            color: #c41e3a;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>

<div class="login-container">

    <div class="logo-section">
        <h1>🚚 Fastway Truck & Forklift Driving School</h1>
        <p>Professional Truck Driver Training & Certification</p>
    </div>

    <div class="contact-info">
        <p><strong>Website:</strong> www.amitycollege.ca</p>
        <p><strong>Email:</strong> info@amitycollege.ca</p>
        <p><strong>Phone:</strong> +1 647 660 0913</p>
    </div>

    <form onsubmit="handleLogin(event)">
        <div class="form-group">
            <label for="password">Access Password</label>
            <input
                type="password"
                id="password"
                placeholder="Enter password"
                required
            >
        </div>

        <button type="submit">Access Training Materials</button>

        <div class="error" id="error">
            ❌ Incorrect password. Please try again.
        </div>
    </form>

</div>

<script>

function handleLogin(event) {

    event.preventDefault();

    const password = document.getElementById("password").value.trim();

    // Add all valid passwords here
    const validPasswords = [
        "fastwaycollege",
        "amity",
        "AMITY",
        "Amity",
        "parveen09061982"
    ];

    if (validPasswords.includes(password)) {

        localStorage.setItem("authenticated", "true");

        window.location.href = "dashboard.html";

    } else {

        document.getElementById("error").style.display = "block";

        document.getElementById("password").value = "";

        document.getElementById("password").focus();

    }

}

</script>

</body>
</html>
